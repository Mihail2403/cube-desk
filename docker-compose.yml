networks:
  net:
    name: cube-desk-net
    driver: bridge

services:
  api:
    container_name: cube-desk-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn app:app --reload --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      # Hostnames from the docker network (override localhost from .env)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/cube_desk
      S3_ENDPOINT_URL: http://minio:9000
    networks:
      net:

  web:
    container_name: cube-desk-web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    depends_on:
      - api
    restart: unless-stopped
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      net:

  postgres:
    container_name: cube-desk-postgres
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cube_desk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cube_desk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      net:

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123456}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:9000/minio/health/live || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      net:

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123456}
      S3_BUCKET: ${S3_BUCKET:-cube-desk-attachments}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb -p local/$$S3_BUCKET || true &&
      mc anonymous set none local/$$S3_BUCKET || true
      "
    networks:
      net:

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
